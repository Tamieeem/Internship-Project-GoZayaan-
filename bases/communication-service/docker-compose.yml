  web:
    build: .
    container_name: communication_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app:z
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_low:
    build: .
    command: celery -A conf worker --loglevel=info -Q low --concurrency=1
    volumes:
      - .:/app:z
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy

  worker_high:
    build: .
    command: celery -A conf worker --loglevel=info -Q high --concurrency=1
    volumes:
      - .:/app:z
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy

  worker_instant:
    build: .
    command: celery -A conf worker --loglevel=info -Q instant --concurrency=1
    volumes:
      - .:/app:z
    env_file:
      - .env
    # We only need 1 replica for local testing to save RAM
    deploy:
      replicas: 1
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  postgres_data:
